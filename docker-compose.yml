services:
  horizon:
    build:
      context: .
      dockerfile: docker/Dockerfile
    # -----------------------------------------------------------------------
    # Resource limits — conservative approximation of one Raspberry Pi 5
    # Cortex-A76 core with Hailo driver running in parallel.
    #
    #   Physical Pi 5:  4 cores @ 2.4 GHz Cortex-A76,  4 096 MB RAM
    #   Hailo reserve: ~1 core,  ~512 MB  (driver + inference orchestration)
    #   Available to detector: 3 cores, 3 584 MB
    #
    # cpus: "1" — the detector runs one Python thread per frame; the other two
    # available cores only help if OpenCV parallelises internally (see env vars
    # below).  Limiting to 1 core + OMP_NUM_THREADS=1 forces fully serial
    # execution, matching how a single Cortex-A76 core would run the detector.
    # Note: Mac/Linux x86 cores are ~1.5–2× faster per clock than Cortex-A76,
    # so passing here is a necessary but not sufficient condition; verify on
    # real hardware for the final gate.
    # -----------------------------------------------------------------------
    cpus: "1"
    mem_limit: "3584m"
    memswap_limit: "3584m"   # disable swap to match bare-metal

    environment:
      # Prevent OpenCV/NumPy from using multiple threads within a single frame,
      # which would give an unfair advantage over a single Pi core.
      - OMP_NUM_THREADS=1
      - OPENBLAS_NUM_THREADS=1
      - NUMEXPR_NUM_THREADS=1
      # Disable OpenCL fallback — Pi 5 CPU has no GPU-accelerated OpenCL path.
      - OPENCV_OPENCL_RUNTIME=disabled

    volumes:
      # Repo source — bind-mounted so edits on the host are reflected immediately
      - .:/workspace
    working_dir: /workspace

    # No fixed entrypoint — run any script directly:
    #   docker compose run --rm horizon python tools/evaluate.py attempts/attempt-2-rotation-invariant
    #   docker compose run --rm horizon python attempts/attempt-3-top-n-ransac/horizon_detect.py data/...
    #   tools/bench_docker.sh
